---
deployment:
  tasks:
    # NOTE: DEPLOYPATH points at a folder named "new.highlinnfarms.com"
    # for historical reasons (it was originally the subdomain's docroot).
    # In cPanel, the bare domain highlinnfarms.com is configured to use
    # this same folder as its document root, so deploys here update the
    # live site at both URLs — there is no need to copy anywhere else.
    - export DEPLOYPATH=/home/highli31/new.highlinnfarms.com/
    - /usr/bin/rsync -a --checksum --exclude='.git/' --exclude='.github/' --exclude='.cpanel.yml' --exclude='.gitattributes' --exclude='.gitignore' --exclude='.DS_Store' --exclude='README.md' ./ $DEPLOYPATH
